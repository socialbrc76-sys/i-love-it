name: Daily KBO Carousel Generator

on:
  schedule:
    # 매일 UTC 22:00 (한국 시간 오전 7시 00분)실행
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 활성화 (테스트용)

jobs:
  generate-carousel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Korean Fonts for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Run KBO Carousel Pipeline
        run: node runner.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}

      - name: Upload Generated Images
        id: upload-images
        uses: actions/upload-artifact@v4
        with:
          name: kbo-carousel-images
          path: output/*.png
          retention-days: 7
