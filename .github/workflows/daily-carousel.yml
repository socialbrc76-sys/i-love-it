name: Daily KBO Carousel Generator

on:
  schedule:
    # 매일 UTC 23:30 (한국 시간 오전 8시 30분)실행
    # KBO 경기는 보통 화~일에 있으나, 혹시 모를 상황을 대비해 매일 돌게 둡니다. (스크립트에서 경기 없으면 자동 종료)
    - cron: '30 23 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 활성화 (테스트용)

jobs:
  generate-carousel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Korean Fonts for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Run KBO Carousel Pipeline
        run: node runner.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload Generated Images
        id: upload-images
        uses: actions/upload-artifact@v4
        with:
          name: kbo-carousel-images
          path: output/*.png
          retention-days: 7
