<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KIA 응원가 오케스트라 - Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    width: 1080px;
    height: 1350px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
    background: #0a0a1a;
}

/* 배경 그라데이션 */
.bg-gradient {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: 
        radial-gradient(ellipse at 50% 20%, rgba(180, 120, 30, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 30% 70%, rgba(200, 50, 50, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(100, 50, 180, 0.12) 0%, transparent 50%),
        linear-gradient(180deg, #0a0a1a 0%, #140c28 50%, #0d0816 100%);
    z-index: 1;
}

/* 스포트라이트 효과 */
.spotlight {
    position: absolute;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 800px;
    background: radial-gradient(ellipse at center, rgba(255,200,80,0.08) 0%, transparent 70%);
    z-index: 2;
}

/* 파티클 */
.particles {
    position: absolute; top:0; left:0; width:100%; height:100%; z-index:2;
}
.particle {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(255,200,100,0.6);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,200,100,0.4);
}

/* 상단 배지 */
.top-badge {
    position: relative; z-index: 10;
    text-align: center;
    padding-top: 65px;
}
.badge-inner {
    display: inline-block;
    background: linear-gradient(135deg, #c8102e, #e63946);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-style: italic;
    font-size: 28px;
    padding: 8px 28px;
    border-radius: 30px;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(200,16,46,0.4);
}

/* 메인 타이틀 영역 */
.main-title {
    position: relative; z-index: 10;
    text-align: center;
    padding: 30px 60px 0;
}
.kia-logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
}
.tiger-emoji {
    font-size: 60px;
    filter: drop-shadow(0 4px 12px rgba(255,150,0,0.5));
}
.title-kr {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 72px;
    line-height: 1.1;
    color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    letter-spacing: -2px;
}
.title-kr .gold {
    background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(255,200,0,0.3));
}
.title-en {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
}

/* 썸네일 프리뷰 */
.thumb-area {
    position: relative; z-index: 10;
    padding: 30px 80px 20px;
}
.thumb-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(200,16,46,0.15);
    border: 3px solid rgba(255,200,100,0.2);
}
.thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90px; height: 90px;
    background: rgba(255,0,0,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 30px rgba(255,0,0,0.4);
}
.play-btn::after {
    content: '';
    width: 0; height: 0;
    border-left: 32px solid #fff;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    margin-left: 6px;
}

/* 설명 */
.desc-area {
    position: relative; z-index: 10;
    padding: 0 80px;
    text-align: center;
    margin-bottom: 20px;
}
.desc-quote {
    font-size: 28px;
    font-weight: 700;
    color: #fbbf24;
    line-height: 1.6;
    word-break: keep-all;
    font-style: italic;
}
.desc-sub {
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    margin-top: 12px;
}

/* 하단 CTA */
.cta-area {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 10px 80px;
}
.cta-box {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: linear-gradient(135deg, rgba(200,16,46,0.3), rgba(255,170,0,0.2));
    border: 1px solid rgba(255,200,100,0.3);
    border-radius: 50px;
    padding: 16px 40px;
}
.cta-text {
    font-size: 26px;
    font-weight: 900;
    color: #ffd700;
}
.cta-arrow {
    font-size: 30px;
    animation: bounce 1s infinite;
}
@keyframes bounce {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(8px); }
}

/* 푸터 */
.footer {
    position: absolute;
    bottom: 25px; width: 100%;
    text-align: center; z-index: 10;
}
.footer-text {
    font-family: 'Archivo Black', sans-serif;
    font-style: italic;
    font-size: 28px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
}
.footer-text .neon { color: #c084fc; }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="spotlight"></div>
<div class="particles">
    <div class="particle" style="top:15%;left:20%"></div>
    <div class="particle" style="top:25%;left:75%"></div>
    <div class="particle" style="top:45%;left:10%"></div>
    <div class="particle" style="top:55%;left:85%"></div>
    <div class="particle" style="top:70%;left:30%"></div>
    <div class="particle" style="top:80%;left:65%"></div>
    <div class="particle" style="top:35%;left:50%"></div>
</div>

<div class="top-badge">
    <div class="badge-inner">🎬 NEW RELEASE</div>
</div>

<div class="main-title">
    <div class="kia-logo-area">
        <span class="tiger-emoji">🐯</span>
        <span class="tiger-emoji">⚾</span>
    </div>
    <div class="title-kr">
        KIA 타이거즈<br>
        <span class="gold">응원가 오케스트라</span><br>
        메들리
    </div>
    <div class="title-en">KIA TIGERS CHEER SONG ORCHESTRA MEDLEY</div>
</div>

<div class="thumb-area">
    <div class="thumb-frame">
        <img class="thumb-img" src="https://img.youtube.com/vi/Puv42ggonac/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/Puv42ggonac/hqdefault.jpg'">
        <div class="play-btn"></div>
    </div>
</div>

<div class="desc-area">
    <div class="desc-quote">"한 명의 선수를 향한 함성이<br>거대한 교향곡이 되는 순간."</div>
    <div class="desc-sub">시네마틱 오케스트라 사운드로 재탄생한 KIA 응원가</div>
</div>

<div class="cta-area">
    <div class="cta-box">
        <span class="cta-text">👉 YouTube에서 'Cosmic Void' 검색!</span>
        <span class="cta-arrow">→</span>
    </div>
</div>

<div class="footer">
    <span class="footer-text">@kbo_data_<span class="neon">lab</span></span>
</div>
</body>
</html>
