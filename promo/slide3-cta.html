<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KIA 응원가 - CTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    width: 1080px;
    height: 1350px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
    background: #0a0a1a;
}

.bg-gradient {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: 
        radial-gradient(ellipse at 50% 40%, rgba(200,16,46,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 70%, rgba(100,50,180,0.12) 0%, transparent 50%),
        linear-gradient(180deg, #0d0816 0%, #1a0c30 50%, #0a0a1a 100%);
    z-index: 1;
}

/* 상단 배지 */
.top-area {
    position: relative; z-index: 10;
    text-align: center;
    padding-top: 65px;
}
.badge {
    display: inline-block;
    background: linear-gradient(135deg, #c8102e, #e63946);
    color: #fff;
    font-weight: 800;
    font-size: 28px;
    padding: 10px 32px;
    border-radius: 30px;
    box-shadow: 0 4px 20px rgba(200,16,46,0.4);
}

/* 큰 플레이 아이콘 */
.big-play {
    position: relative; z-index: 10;
    text-align: center;
    padding: 50px 0 30px;
}
.play-circle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c8102e, #ff3355);
    box-shadow: 0 0 80px rgba(200,16,46,0.4), 0 0 160px rgba(200,16,46,0.15);
    position: relative;
}
.play-circle::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 3px solid rgba(255,200,100,0.2);
}
.play-circle::after {
    content: '';
    width: 0; height: 0;
    border-left: 60px solid #fff;
    border-top: 38px solid transparent;
    border-bottom: 38px solid transparent;
    margin-left: 10px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}

/* 메인 메시지 */
.main-msg {
    position: relative; z-index: 10;
    text-align: center;
    padding: 0 70px;
}
.msg-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 64px;
    line-height: 1.2;
    margin-bottom: 16px;
}
.msg-title .gold {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.msg-sub {
    font-size: 26px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    word-break: keep-all;
}

/* 검색 안내 */
.search-guide {
    position: relative; z-index: 10;
    margin: 40px 80px;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 30px 40px;
}
.search-step {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
}
.search-step:last-child { margin-bottom: 0; }
.step-num {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c8102e, #ff3355);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 22px;
    flex-shrink: 0;
}
.step-text {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
}
.step-text .highlight {
    color: #ffd700;
    font-weight: 900;
}

/* QR 대체 - URL 표시 */
.url-box {
    position: relative; z-index: 10;
    margin: 0 80px;
    background: rgba(255,255,255,0.05);
    border: 1px dashed rgba(255,200,100,0.3);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
}
.url-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    word-break: break-all;
}

/* 채널 정보 */
.channel-info {
    position: relative; z-index: 10;
    margin: 25px 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: linear-gradient(135deg, rgba(255,0,80,0.12), rgba(168,85,247,0.12));
    border: 1px solid rgba(255,100,150,0.2);
    border-radius: 20px;
    padding: 24px 40px;
}
.ch-icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff0050, #c850c0);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; flex-shrink: 0;
}
.ch-text .ch-name {
    font-size: 28px; font-weight: 900; color: #fbbf24;
}
.ch-text .ch-desc {
    font-size: 18px; color: #cbd5e1; margin-top: 2px;
}
.ch-text .ch-handle {
    font-size: 16px; color: #a78bfa; font-weight: 600; margin-top: 2px;
}

/* 푸터 */
.footer {
    position: absolute;
    bottom: 30px; width: 100%;
    text-align: center; z-index: 10;
}
.footer-text {
    font-family: 'Archivo Black', sans-serif;
    font-style: italic;
    font-size: 28px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
}
.footer-text .neon { color: #c084fc; }
</style>
</head>
<body>
<div class="bg-gradient"></div>

<div class="top-area">
    <div class="badge">🔥 지금 바로 감상하세요!</div>
</div>

<div class="big-play">
    <div class="play-circle"></div>
</div>

<div class="main-msg">
    <div class="msg-title">
        <span class="gold">KIA 타이거즈</span> 팬이라면<br>
        반드시 들어야 할 영상 🐯
    </div>
    <div class="msg-sub">
        챔피언스 필드의 함성이<br>
        한 편의 영화 같은 오케스트라로 울려 퍼집니다
    </div>
</div>

<div class="search-guide">
    <div class="search-step">
        <div class="step-num">1</div>
        <div class="step-text">YouTube 앱을 열어주세요 📱</div>
    </div>
    <div class="search-step">
        <div class="step-num">2</div>
        <div class="step-text"><span class="highlight">"Cosmic Void"</span> 검색 🔎</div>
    </div>
    <div class="search-step">
        <div class="step-num">3</div>
        <div class="step-text"><span class="highlight">"KIA 타이거즈 응원가 오케스트라"</span> 클릭! 🎵</div>
    </div>
</div>

<div class="url-box">
    <div class="url-text">youtube.com/@CosmicVoid-kpop</div>
</div>

<div class="channel-info">
    <div class="ch-icon">🌌</div>
    <div class="ch-text">
        <div class="ch-name">Cosmic Void</div>
        <div class="ch-desc">AI 5인조 K-pop 비주얼 밴드 🎸</div>
        <div class="ch-handle">구독 + 좋아요 + 알림설정 🔔</div>
    </div>
</div>

<div class="footer">
    <span class="footer-text">@kbo_data_<span class="neon">lab</span></span>
</div>
</body>
</html>
