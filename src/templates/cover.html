<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>커버</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@700;900&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    width: 1080px;
    height: 1350px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
    /* 전체 야구장 배경 + 감각적인 보라/네이비 그라디언트 오버레이 */
    background-color: #120630;
    background-image: 
        linear-gradient(160deg, rgba(26,8,61,0.85) 0%, rgba(42,14,92,0.6) 50%, rgba(18,6,48,0.95) 100%),
        url('{{bodyBgUrl}}');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
}
/* 중앙 빛 효과 */
body::before {
    content: '';
    position: absolute;
    top: -20%; left: -20%; width: 140%; height: 140%;
    background: radial-gradient(ellipse at 50% 30%, rgba(100, 40, 200, 0.3) 0%, transparent 60%);
    z-index: 0;
}
/* 미세한 스트라이프 질감 */
body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.015) 0deg 10deg, transparent 10deg 20deg);
    z-index: 0;
}

/* ── 상단 후킹문구 영역 ── */
.hook-area {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 55px 50px 20px;
}
.hook-badge {
    display: inline-block;
    background: #00FF9D;
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-style: italic;
    font-size: 28px;
    padding: 6px 20px;
    transform: skewX(-10deg);
    margin-bottom: 12px;
    letter-spacing: 1px;
}
.hook-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 90px;
    color: #fff;
    line-height: 1.05;
    letter-spacing: -2px;
    -webkit-text-stroke: 3px #000;
    paint-order: stroke fill;
    text-shadow: 4px 4px 0px rgba(0,0,0,0.6);
}
.hook-title .highlight {
    color: #00FF9D;
    -webkit-text-stroke: 3px #000;
}
.hook-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    letter-spacing: 0.5px;
}

/* ── 카드 그리드 ── */
.grid-wrap {
    position: relative;
    z-index: 10;
    padding: 25px 50px 0;
}
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    width: 100%;
}

.card {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.08);
}
/* 카드 상단 팀컬러 악센트 */
.team-accent {
    height: 5px;
    width: 100%;
    flex-shrink: 0;
}

/* 인물 사진 영역 */
.photo-area {
    height: 300px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    overflow: hidden;
}
.photo-bg {
    position: absolute;
    top: -10px; left: -10px; right: -10px; bottom: -10px;
    background-size: cover;
    background-position: center;
    filter: blur(6px) brightness(0.5) saturate(1.2);
}
.photo-bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(26,26,46,0.9) 100%);
}
.photo-img {
    position: relative;
    z-index: 2;
    height: 92%;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.9));
}

/* 이름바 */
.name-bar {
    background: #111;
    color: #fff;
    text-align: center;
    font-size: 36px;
    font-weight: 900;
    padding: 14px 8px;
    border-top: 2px solid rgba(255,255,255,0.1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* 성적바 */
.stat-bar {
    text-align: center;
    font-size: 30px;
    font-weight: 900;
    padding: 16px 8px;
    letter-spacing: -1px;
    word-break: keep-all;
    white-space: nowrap;
}

/* ── 푸터 로고 ── */
.footer {
    position: absolute;
    bottom: 35px;
    width: 100%;
    text-align: center;
    z-index: 10;
}
.footer-inner {
    display: inline-flex;
    align-items: center;
    gap: 12px;
}
.footer-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-style: italic;
    font-size: 38px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
}
.footer-text .neon { color: #c084fc; text-shadow: 0 0 10px rgba(192,132,252,0.6); font-style: italic; }

</style>
</head>
<body>

<!-- 후킹문구 -->
<div class="hook-area">
    <div class="hook-badge">{{hookBadge}}</div>
    <div class="hook-title">
        {{hookText}}
    </div>
    <div class="hook-sub">{{hookSubText}}</div>
</div>

<!-- 2x2 카드 그리드 -->
<div class="grid-wrap">
    <div class="grid">
        <!-- Card 1 -->
        <div class="card">
            <div class="team-accent" style="background: {{p1Accent}};"></div>
            <div class="photo-area">
                <div class="photo-bg" style="background-image: url('{{p1BgUrl}}');"></div>
                <img src="{{p1Img}}" class="photo-img" onerror="this.style.display='none'">
            </div>
            <div class="name-bar">{{p1Name}} ({{p1Team}})</div>
            <div class="stat-bar" style="background: {{p1Accent}}; color: {{p1Text}};">
                {{p1Stats}}
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <div class="team-accent" style="background: {{p2Accent}};"></div>
            <div class="photo-area">
                <div class="photo-bg" style="background-image: url('{{p2BgUrl}}');"></div>
                <img src="{{p2Img}}" class="photo-img" onerror="this.style.display='none'">
            </div>
            <div class="name-bar">{{p2Name}} ({{p2Team}})</div>
            <div class="stat-bar" style="background: {{p2Accent}}; color: {{p2Text}};">
                {{p2Stats}}
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <div class="team-accent" style="background: {{p3Accent}};"></div>
            <div class="photo-area">
                <div class="photo-bg" style="background-image: url('{{p3BgUrl}}');"></div>
                <img src="{{p3Img}}" class="photo-img" onerror="this.style.display='none'">
            </div>
            <div class="name-bar">{{p3Name}} ({{p3Team}})</div>
            <div class="stat-bar" style="background: {{p3Accent}}; color: {{p3Text}};">
                {{p3Stats}}
            </div>
        </div>

        <!-- Card 4 -->
        <div class="card">
            <div class="team-accent" style="background: {{p4Accent}};"></div>
            <div class="photo-area">
                <div class="photo-bg" style="background-image: url('{{p4BgUrl}}');"></div>
                <img src="{{p4Img}}" class="photo-img" onerror="this.style.display='none'">
            </div>
            <div class="name-bar">{{p4Name}} ({{p4Team}})</div>
            <div class="stat-bar" style="background: {{p4Accent}}; color: {{p4Text}};">
                {{p4Stats}}
            </div>
        </div>
    </div>
</div>

<!-- 푸터 -->
<div class="footer">
    <div class="footer-inner">
        <span class="footer-text">@kbo_data_<span class="neon">lab</span></span> &nbsp;⚾&nbsp; KBO</span>
    </div>
</div>

</body>
</html>
